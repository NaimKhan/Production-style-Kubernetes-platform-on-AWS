# ============================================================================
# THIS IS AN EXAMPLE FILE — DO NOT PUT REAL CREDENTIALS HERE.
# ============================================================================
# This file exists to document the *shape* of the Secret the backend expects
# (keys it reads via envFrom in backend-deployment.yaml), so anyone can
# recreate it correctly. It is safe to commit because every value below is a
# placeholder.
#
# In a real environment, this Secret is NEVER created by applying this file
# directly. Instead, use one of:
#
#   1. External Secrets Operator / AWS Secrets Manager CSI driver — the
#      recommended approach for this platform. The Secret is synced
#      automatically from AWS Secrets Manager into the cluster; the actual
#      password never appears in git, in a kubectl command, or in CI logs.
#      (See docs/PRIVATE_DB_CONNECTIVITY.md for the exact wiring.)
#
#   2. Manually, once, out of band:
#        kubectl create secret generic backend-db-secret \
#          --namespace devops-platform \
#          --from-literal=DB_USERNAME='<real-username>' \
#          --from-literal=DB_PASSWORD='<real-password>'
#
#   3. Sealed Secrets / SOPS if the team wants the *encrypted* Secret
#      manifest committed to git (ciphertext only, safe to commit).
#
# Never run `kubectl apply -f` on this exact file expecting it to be secure —
# it's a documentation template, not a real Secret.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-db-secret
  namespace: devops-platform
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: devops-platform
type: Opaque
stringData:
  DB_USERNAME: "CHANGE_ME_placeholder_username"
  DB_PASSWORD: "CHANGE_ME_placeholder_password"
