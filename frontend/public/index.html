<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Platform - Frontend</title>
  <style>
    body {
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      max-width: 480px;
      text-align: center;
    }
    h1 { color: #38bdf8; margin-bottom: 0.5rem; }
    .status { font-size: 1.1rem; margin-top: 1rem; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    pre {
      background: #0f172a;
      padding: 1rem;
      border-radius: 8px;
      text-align: left;
      overflow-x: auto;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DevOps Platform</h1>
    <p>Frontend container is up. Fetching backend status...</p>
    <div class="status" id="status">Checking backend...</div>
    <pre id="details"></pre>
  </div>

  <script>
    async function checkBackend() {
      const statusEl = document.getElementById("status");
      const detailsEl = document.getElementById("details");
      try {
        const res = await fetch("/api/info");
        if (!res.ok) throw new Error("Bad response: " + res.status);
        const data = await res.json();
        statusEl.textContent = "Backend reachable ✔";
        statusEl.className = "status ok";
        detailsEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        statusEl.textContent = "Backend unreachable ✖";
        statusEl.className = "status err";
        detailsEl.textContent = err.message;
      }
    }
    checkBackend();
  </script>
</body>
</html>
