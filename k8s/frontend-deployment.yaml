apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devops-platform
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: devops-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: devops-platform
    spec:
      containers:
        - name: frontend
          # Placeholder tag — replaced by CI at deploy time with the git-sha
          # tag that was just built and pushed. Never "latest" in a manifest
          # that gets applied to a real environment.
          image: "<ECR_REGISTRY>/devops-platform-frontend:v0.1.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            # Resolves via the cluster's internal DNS (CoreDNS) to
            # backend-service.devops-platform.svc.cluster.local — never a
            # public hostname or IP.
            - name: BACKEND_HOST
              value: "backend-service"
            - name: BACKEND_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      securityContext:
        fsGroup: 101   # nginx group in the nginx:alpine image
